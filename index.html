  <body>
    <script>
      // Workaround for "Cannot set property fetch of #<Window> which has only a getter"
      try {
        if (window.fetch && !Object.getOwnPropertyDescriptor(window, 'fetch')?.set) {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: () => originalFetch,
            set: (v) => { console.warn('Something tried to overwrite fetch', v); }
          });
        }
      } catch (e) {}
    </script>
    <div id="root"></div>
  </body>
